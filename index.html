<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo fetch</title>
</head>
<body>
    <h2>Login</h2>
    <form id="login">
        <input type="email" placeholder="ingresa tu email" id="correo">
        <input type="password" placeholder="ingresa tu password" id="password">
        <button type="submit">Enviar</button>
    </form>
</body>

<script>
    const loginFormulario = document.getElementById("login");

    // Listener
    loginFormulario.addEventListener("submit", function(event) {
        
        event.preventDefault();

        const correo = event.target.elements.correo;
        const password = event.target.elements.password;


        // validaciones
        if (correo.value.length < 3) {
            return alert("El correo debe tener al menos 3 caracteres")
        } else {
            alert("Correcto")
        }

        console.log(event.target.elements);

        fetch("http://localhost:3000/api/auth/login", {
            method: "post",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: correo.value,
                password: password.value
            })
        })
        .then((respuesta) => respuesta.json())
        .then((datos) => {
            localStorage.setItem('token', datos.data.token);
            // window.location.href = './dashboard.html'
        })
        .catch(error => console.error(error))
    })


</script>
</html>
